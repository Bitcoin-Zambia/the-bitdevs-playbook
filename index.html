<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>The BitDevs Playbook by Btrust</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-plugin-gitalk-fixed@1.0.0/styles.css">
  <style>
    /* Sidebar title styling */
    .sidebar-nav > h1 {
      font-size: 24px;
      font-weight: bold;
      margin: 20px 0 15px 0;
    }

    /* Target the edit link more specifically */
    a[href*="github.com"][href*="edit"] {
      position: fixed !important;
      bottom: 20px !important;
      left: 20px !important;
      top: auto !important;
      right: auto !important;
      z-index: 999 !important;
    }
    a[href*="github.com"][href*="edit"]::before {
      content: '📝 ';
    }

    /* Language dropdown - moved slightly left */
    .language-selector {
      position: fixed;
      top: 20px;
      right: 100px;
      z-index: 1000;
    }

    .language-dropdown {
      position: relative;
      display: inline-block;
    }

    .language-btn {
      padding: 8px 12px;
      background: #f7931a;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .language-btn:hover {
      background: #c97e1b;
    }

    .language-btn::after {
      content: '▼';
      font-size: 10px;
    }

    .language-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-top: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      min-width: 150px;
      z-index: 1001;
    }

    .language-menu.active {
      display: block;
    }

    .language-menu a {
      display: block;
      padding: 10px 15px;
      text-decoration: none;
      color: #333;
      transition: background 0.2s;
      border-bottom: 1px solid #eee;
    }

    .language-menu a:last-child {
      border-bottom: none;
    }

    .language-menu a:hover {
      background: #f5f5f5;
    }

    .language-menu a.active {
      background: #f7931a;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <!-- Language Dropdown -->
  <div class="language-selector">
    <div class="language-dropdown">
      <button class="language-btn" id="language-btn">EN</button>
      <div class="language-menu" id="language-menu">
        <a href="#/" data-lang="en">English</a>
        <a href="#/translations/es/" data-lang="es">Español</a>
      </div>
    </div>
  </div>

  <script src="//cdn.jsdelivr.net/npm/docsify-edit-on-github"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/@joeybaker/docsify-corner@latest"></script>
  <script>
    let hash = window.location.hash;
    const githubBase = 'https://github.com/bitcoin-zambia/bitdevs-playbook/tree/main/';
    let githubPath = githubBase;
    let sidebarName = 'The BitDevs Playbook';
    let pageTitle = 'The BitDevs Playbook by Btrust';

    const languages = {
      en: { name: 'English', sidebar: 'The BitDevs Playbook', title: 'The BitDevs Playbook by Btrust', path: '' },
      es: { name: 'Español', sidebar: 'El BitDevs Playbook', title: 'El BitDevs Playbook por Btrust', path: 'translations/es/' }
    };

    function updateTitles() {
      hash = window.location.hash;
      let currentLang = 'en';

      if (hash.includes('/translations/es/')) {
        currentLang = 'es';
      }

      const langData = languages[currentLang];
      githubPath = githubBase + langData.path;
      sidebarName = langData.sidebar;
      pageTitle = langData.title;
      window.$docsify.name = sidebarName;

      document.title = pageTitle;

      // Update only the h1 directly in sidebar-nav
      const sidebarTitle = document.querySelector('.sidebar-nav > h1');
      if (sidebarTitle) {
        sidebarTitle.textContent = sidebarName;
      }

      updateLanguageDropdown(currentLang);
    }

    function updateLanguageDropdown(currentLang) {
      const btn = document.getElementById('language-btn');
      const menuLinks = document.querySelectorAll('#language-menu a');

      btn.textContent = currentLang.toUpperCase();

      menuLinks.forEach(link => {
        if (link.dataset.lang === currentLang) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });

      document.getElementById('language-menu').classList.remove('active');
    }

    // Toggle dropdown on button click
    document.getElementById('language-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('language-menu').classList.toggle('active');
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', function() {
      document.getElementById('language-menu').classList.remove('active');
    });

    updateTitles();

    window.$docsify = {
      ready: function(vm) {
        updateTitles();
      },
      hashchange: function() {
        updateTitles();
      },
      basePath: '/bitdevs-playbook/',
      name: sidebarName,
      repo: 'Bitcoin-Zambia/bitdevs-playbook',
      loadSidebar: true,
      search: 'auto',
      corner: {
        url: 'https://github.com/bitcoin-zambia/bitdevs-playbook',
        position: 'right'
      },
      plugins: [
        EditOnGithubPlugin.create(githubPath)
      ]
    }
  </script>
</body>
</html>
