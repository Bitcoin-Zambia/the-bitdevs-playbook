<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>The BitDevs Playbook by Btrust</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <style>
    /* Target the edit link more specifically */
    a[href*="github.com"][href*="edit"] {
      position: fixed !important;
      bottom: 20px !important;
      left: 20px !important;
      top: auto !important;
      right: auto !important;
      z-index: 999 !important;
    }
    a[href*="github.com"][href*="edit"]::before {
      content: '📝 ';
    }

    /* Language selector */
    .language-selector {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
    .language-selector a {
      display: inline-block;
      padding: 8px 12px;
      margin: 0 5px;
      background: #f7931a;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
      transition: background 0.3s;
    }
    .language-selector a:hover {
      background: #c97e1b;
    }
    .language-selector a.active {
      background: #c97e1b;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <!-- Language Selector -->
  <div class="language-selector">
    <a id="en-link" href="#/" class="active">English</a>
    <a id="es-link" href="#/translations/es/">Español</a>
  </div>

  <script src="//cdn.jsdelivr.net/npm/docsify-edit-on-github"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script>
    const hash = window.location.hash;
    const githubBase = 'https://github.com/bitcoin-zambia/bitdevs-playbook/tree/main/';
    let githubPath = githubBase;
    let sidebarName = 'The BitDevs Playbook';
    let pageTitle = 'The BitDevs Playbook by Btrust';

    if (hash.includes('/translations/es/')) {
      githubPath = githubBase + 'translations/es/';
      sidebarName = 'El BitDevs Playbook';
      pageTitle = 'El BitDevs Playbook por Btrust';
    }

    window.$docsify = {
      ready: function(vm) {
        document.title = pageTitle;
        // Update active language link
        const enLink = document.getElementById('en-link');
        const esLink = document.getElementById('es-link');
        if (hash.includes('/translations/es/')) {
          enLink.classList.remove('active');
          esLink.classList.add('active');
        } else {
          enLink.classList.add('active');
          esLink.classList.remove('active');
        }
      },
      basePath: '/bitdevs-playbook/',
      name: sidebarName,
      repo: 'Bitcoin-Zambia/bitdevs-playbook',
      loadSidebar: true,
      search: 'auto',
      plugins: [
        EditOnGithubPlugin.create(githubPath)
      ]
    }
  </script>
</body>
</html>
